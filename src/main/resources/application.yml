server:
  port: 8080

spring:
  application:
    name: dataforge-api

  datasource:
    url: jdbc:postgresql://localhost:5432/integration_db
    username: admin
    password: admin123
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        format sql: true
    hibernate:
      ddl-auto: update 


  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin123


  flyway:
    enabled: false