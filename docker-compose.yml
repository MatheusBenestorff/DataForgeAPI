services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rmq_integration_hub
    ports:
      - "5672:5672"   
      - "15672:15672" 
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - integration_network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 3


  postgres:
    image: postgres:16
    container_name: pg_integration_hub
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: integration_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - integration_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d integration_db"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  rabbitmq_data:
  postgres_data:

networks:
  integration_network:
    driver: bridge